# --- GLOBAL FORMAT ---
format = """
$directory\
${custom.git_info}\
$git_status\
$cmd_duration\
$line_break\
$character"""

[directory]
truncation_length = 0
fish_style_pwd_dir_length = 0
style = "bold cyan"
format = "[$path]($style) "

[custom.git_info]
command = '''
# 1. Get raw decorations
raw=$(git log -1 --pretty=format:"%D" 2>/dev/null)
hash=$(git rev-parse --short HEAD 2>/dev/null)

# 2. Define ANSI codes
C=$(printf '\033[1;36m')  # Cyan (HEAD)
Y=$(printf '\033[1;33m')  # Yellow (Arrow / Tags)
G=$(printf '\033[1;32m')  # Green (Local Branches)
R=$(printf '\033[1;31m')  # Red (Remotes)
P=$(printf '\033[1;35m')  # Purple (Hash)
RS=$(printf '\033[0m')    # Reset

# 3. Process refs
echo "$raw" | tr ',' '\n' | while read -r ref; do
    ref=$(echo "$ref" | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
    [ -z "$ref" ] && continue

    if echo "$ref" | grep -q "HEAD ->"; then
        # ATTACHED: HEAD (Cyan) + Arrow (Yellow) + Branch (Green)
        target=$(echo "$ref" | sed 's/HEAD -> //')
        printf "${C}HEAD${RS} ${Y}->${RS} ${G}${target}${RS}, "
    elif [ "$ref" = "HEAD" ]; then
        # DETACHED: Just Cyan HEAD
        printf "${C}${ref}${RS}, "
    elif echo "$ref" | grep -q "tag: "; then
        # TAG: Yellow
        tagname=$(echo "$ref" | sed 's/tag: //')
        printf "${Y}${tagname}${RS}, "
    elif echo "$ref" | grep -q "origin/"; then
        # REMOTE: Red
        printf "${R}${ref}${RS}, "
    else
        # LOCAL BRANCH: Green
        printf "${G}${ref}${RS}, "
    fi
done | sed 's/, $/ /'

# 4. Print the hash
printf "${P}(${hash})${RS}"
'''
when = "git rev-parse --is-inside-work-tree 2>/dev/null"
shell = ["sh"]
format = "on  $output "

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold red"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇡${ahead_count}⇣${behind_count}"

[cmd_duration]
min_time = 2_000
format = "took [⏱ $duration]($style)"
style = "yellow"

[line_break]
disabled = false

[character]
success_symbol = "[>](bold green)"
error_symbol = "[>](bold red)"
